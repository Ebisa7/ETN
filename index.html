<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETN Coin Airdrop Game</title>
  <link rel="stylesheet" href="style.css"> <!-- Link to existing CSS -->
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <p>Loading...</p>
    </div>
  </div>

  <!-- Coin Balance Display -->
  <div id="coin-balance" style="text-align: center; margin-top: 20px;">
    <h2>Coin Balance: <span id="balance">0</span> ETN</h2>
    <img src="well2.png" alt="Coin" style="width: 40px; height: 40px; margin-left: 10px;">
  </div>

  <!-- Navigation Tabs -->
  <div class="tabs">
    <button class="tab" id="home-tab" onclick="navigateTo('index.html')">
      <img src="home.png" alt="Home">
    </button>
    <button class="tab" id="tasks-tab" onclick="navigateTo('tasks.html')">
      <img src="tasks.png" alt="Tasks">
    </button>
    <button class="tab" id="invite-tab" onclick="navigateTo('invite.html')">
      <img src="invite.png" alt="Invite">
    </button>
    <button class="tab" id="airdrop-tab" onclick="navigateTo('airdrop.html')">
      <img src="airdrop.png" alt="Airdrop">
    </button>
  </div>

  <!-- Game Button -->
  <div style="text-align: center; margin-top: 20px;">
    <button onclick="navigateTo('game.html')">
      <img src="game.png" alt="Play Game" style="width: 50px; height: 50px;">
    </button>
  </div>

  <script src="app.js"></script> <!-- Link to existing JavaScript -->
  <script>
    // Add navigation function
    function navigateTo(page) {
      window.location.href = page;
    }

    // Load coin balance from local storage
    window.onload = function() {
      const balance = localStorage.getItem('coinBalance') || 0; // Default to 0 if no balance found
      document.getElementById('balance').innerText = balance;

      // Hide loading screen after a short delay
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
      }, 500); // Adjust timeout as needed
    };
  </script>
</body>
</html>
