<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETN Drop Game</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .main {
      text-align: center;
      padding: 20px;
    }
    .coin-balance {
      font-size: 48px;
      margin-top: 20px;
    }
    .telegram-user {
      font-size: 18px;
      color: #aaa;
    }
    .drop-game {
      margin-top: 40px;
    }
    img {
      width: 100px;
      height: auto;
    }
    .tabs {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
    }
    .tabs img {
      width: 50px;
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="coin-balance">
      <img src="etn.png" alt="ETN Coin"> <span id="coin-count">200</span>
    </div>
    <div class="telegram-user" id="telegram-username">
      <!-- User's Telegram username will appear here -->
    </div>
    <div class="drop-game">
      <img src="playbanner.png" alt="Drop Game Banner">
    </div>
  </div>
  <div class="tabs">
    <img src="home.png" alt="Home">
    <img src="task.png" alt="Tasks">
  </div>

  <script type="module">
    // Import Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA_S5XfXJ7iyLIrPBOPkvP0110vXjzhqEg",
      authDomain: "etndrop-bc9c3.firebaseapp.com",
      projectId: "etndrop-bc9c3",
      storageBucket: "etndrop-bc9c3.appspot.com",
      messagingSenderId: "1017600425514",
      appId: "1:1017600425514:web:f65bb6ee44f86da2014d53"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Initialize Telegram Web Apps
    const tg = window.Telegram.WebApp;
    const username = tg.initDataUnsafe?.user?.username;

    // Display Telegram username
    if (username) {
      document.getElementById('telegram-username').textContent = `@${username}`;
    }

    // Firebase document reference
    const userRef = doc(db, "users", username);

    // Retrieve and update coin balance
    async function getUserData() {
      const userSnap = await getDoc(userRef);
      if (userSnap.exists()) {
        document.getElementById("coin-count").textContent = userSnap.data().coins;
      } else {
        // Set initial data if user is new
        await setDoc(userRef, { coins: 200 });
        document.getElementById("coin-count").textContent = 200;
      }
    }

    // Fetch user data
    getUserData();
  </script>
</body>
</html>
