<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header>
            <div class="coin-display">
                <img src="etnlogo.png" alt="Coin Logo" class="coin-logo">
                <h1 id="coin-balance">200</h1>
                <p id="username">@telegram_username</p>
            </div>
        </header>
        <main>
            <section id="tasks">
                <h2>Tasks</h2>
                <ul>
                    <li><input type="checkbox" id="task1"> Join $ETN</li>
                    <li><input type="checkbox" id="task2"> Add $ETN to username</li>
                </ul>
            </section>
            <section id="game">
                <h2>Drop Game</h2>
                <img src="playbanner.png" alt="Play the Game" class="game-banner">
                <button id="play-game">Play</button>
            </section>
        </main>
        <footer>
            <img src="home.png" alt="Home" class="tab-icon">
            <img src="task.png" alt="Tasks" class="tab-icon">
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
