<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETN Coin Airdrop Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <p>Loading...</p>
    </div>
  </div>

  <!-- Introduction Tutorial -->
  <div id="tutorial-container">
    <!-- Page 1 -->
    <div class="page" id="page1">
      <img src="well1.gif" alt="Well 1" class="tutorial-img">
      <h1>Welcome to ETN Coin Airdrop!</h1>
      <button class="continue-button">Continue</button>
    </div>

    <!-- Page 2 -->
    <div class="page" id="page2">
      <img src="well2.png" alt="Well 2" class="tutorial-img">
      <h1>What is ETN?</h1>
      <p>$ETN - ET NETSA COIN is the lifeblood of the ETN Ecosystem</p>
      <button class="continue-button">Continue</button>
    </div>

    <!-- Page 3 -->
    <div class="page" id="page3">
      <img src="well3.gif" alt="Well 3" class="tutorial-img">
      <h1>What Now?</h1>
      <p>Now, let's start earning $ETN tokens!</p>
      <button class="continue-button">Let’s Go!</button>
    </div>
  </div>

  <!-- Main Game Page -->
  <div id="game-container">
    <div class="coin-balance">
      <h2>Coin Balance: <span id="coin-balance">0</span> ETN</h2>
    </div>
    <div class="tabs">
      <button class="tab" id="home-tab">
        <img src="home.png" alt="Home">
      </button>
      <button class="tab" id="tasks-tab">
        <img src="tasks.png" alt="Tasks">
      </button>
      <button class="tab" id="invite-tab">
        <img src="invite.png" alt="Invite">
      </button>
      <button class="tab" id="airdrop-tab">
        <img src="airdrop.png" alt="Airdrop">
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
