<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header>
            <div class="coin-display">
                <img src="etnlogo.png" alt="Coin Logo" class="coin-logo">
                <h1 id="coin-balance">0</h1>
                <p id="username">@guest</p>
            </div>
        </header>

        <main id="main-content">
            <h2>Drop Game</h2>
            <img src="playbanner.png" alt="Play the Game" class="game-banner">
            <button id="play-game">Play</button>
        </main>

        <footer>
            <img src="home.png" alt="Home" class="tab-icon" id="home-tab">
            <img src="task.png" alt="Tasks" class="tab-icon" id="tasks-tab">
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
