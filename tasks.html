<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Membership</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
    }
    .user-info {
      margin: 20px;
      padding: 10px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .main-button {
      background-color: var(--tg-theme-button-color);
      color: var(--tg-theme-button-text-color);
      border: none;
      padding: 15px 30px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 20px;
      transition: opacity 0.3s;
    }
    .main-button:hover {
      opacity: 0.8;
    }
    .secondary-button {
      background-color: #0088cc; /* Customize this */
      color: white; /* Customize this */
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 10px;
    }
    .secondary-button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>Check Membership</h1>
  <div class="user-info">
    <p id="membership-status"></p>
    <button class="main-button" id="joinChannel">Join Channel</button>
    <button class="secondary-button" id="checkMembership">Check Membership</button>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    const chatId = 'YOUR_CHAT_ID'; // Replace with your channel chat ID
    const botToken = 'YOUR_BOT_TOKEN'; // Replace with your bot token

    document.getElementById('checkMembership').addEventListener('click', async () => {
      const userId = tg.initDataUnsafe.user.id;
      const response = await fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=${chatId}&user_id=${userId}`);
      const data = await response.json();
      
      if (data.result.status === 'member' || data.result.status === 'administrator') {
        document.getElementById('membership-status').innerText = 'You are a member of the channel!';
      } else {
        document.getElementById('membership-status').innerText = 'You are not a member of the channel.';
      }
    });

    document.getElementById('joinChannel').addEventListener('click', () => {
      window.open('https://t.me/lt_coin', '_blank'); // Link to your Telegram channel
      // No close functionality, the app remains open
    });
  </script>
</body>
</html>
