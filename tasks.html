<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Membership Check</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: white; /* Set the body background color to white */
    }
    button {
      background-color: #0088cc;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    /* Style for the header to match Telegram's interface */
    .telegram-header {
      background-color: white; /* White header color */
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Optional shadow for better visibility */
    }
  </style>
</head>
<body>
  <div class="telegram-header">
    <h1>Membership Status</h1>
  </div>
  <p id="status">Checking your membership...</p>
  <button id="checkMembership">Check Membership</button>
  <button id="joinChannel" style="display:none;">Join Channel</button>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    window.Telegram.WebApp.ready();

    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe.user.id;
    const joinButton = document.getElementById('joinChannel');
    const statusElement = document.getElementById('status');

    // Check membership status when the "Check Membership" button is clicked
    document.getElementById('checkMembership').onclick = function() {
      // Call the bot API to check membership status
      fetch(`https://api.telegram.org/botYOUR_BOT_TOKEN/getChatMember?chat_id=@lt_coin&user_id=${userId}`)
        .then(response => response.json())
        .then(data => {
          if (data.result.status === 'member' || data.result.status === 'administrator') {
            statusElement.textContent = 'You are a member!';
            joinButton.style.display = 'none'; // Hide join button if member
          } else {
            statusElement.textContent = 'You are not a member!';
            joinButton.style.display = 'block'; // Show join button if not a member
          }
        })
        .catch(error => {
          statusElement.textContent = 'Error checking membership.';
        });
    };

    // Change the join button to redirect to the channel directly
    joinButton.onclick = function() {
      const joinUrl = 'https://t.me/lt_coin';
      const newTab = window.open(joinUrl, '_blank'); // Open the channel in a new tab
      if (newTab) newTab.focus(); // Focus the new tab if it was opened
      else alert('Please allow popups for this website'); // Alert if the popup is blocked
    };
  </script>
</body>
</html>
