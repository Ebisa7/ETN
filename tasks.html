<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Membership Check</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    button {
      background-color: #0088cc;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>
<body>
  <h1>Membership Status</h1>
  <p id="status">Checking your membership...</p>
  <button id="checkMembership">Check Membership</button>
  <button id="joinChannel" style="display:none;">Join Channel</button>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    window.Telegram.WebApp.ready();

    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe.user.id;
    const joinButton = document.getElementById('joinChannel');
    const statusElement = document.getElementById('status');

    // Check membership status when the "Check Membership" button is clicked
    document.getElementById('checkMembership').onclick = function() {
      // Call the bot API to check membership status
      fetch(`https://api.telegram.org/bot7278739263:AAHt34uP3TLIUUOt_0lgHPLsIgtk68SGsSo/getChatMember?chat_id=@lt_coin&user_id=${userId}`)
        .then(response => response.json())
        .then(data => {
          if (data.result.status === 'member' || data.result.status === 'administrator') {
            statusElement.textContent = 'You are a member!';
            joinButton.style.display = 'none'; // Hide join button if member
          } else {
            statusElement.textContent = 'You are not a member!';
            joinButton.style.display = 'block'; // Show join button if not a member
          }
        })
        .catch(error => {
          statusElement.textContent = 'Error checking membership.';
        });
    };

    // Handle the "Join Channel" button to open link in a new tab
    joinButton.onclick = function(event) {
      event.preventDefault(); // Prevent default action
      window.open('https://t.me/lt_coin', '_blank'); // Open in new tab
      // Optionally, you can show a message here to let the user know they can join the channel.
      statusElement.textContent = 'You can now join the channel in a new tab.';
    };
  </script>
</body>
</html>
