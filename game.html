<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETN Coin Game</title>
  <link rel="icon" href="path/to/favicon.ico" type="image/x-icon">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      background-color: #133A2A;
    }
    canvas {
      display: block;
    }
    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #f2c94c;
      font-size: 24px;
    }
    #timer {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #f2c94c;
      font-size: 24px;
    }
    #instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      display: none; /* Initially hidden */
    }
    #restartButton {
      display: none; /* Initially hidden */
      background-color: #f2c94c;
      border: none;
      padding: 10px 20px;
      font-size: 20px;
      cursor: pointer;
      color: #133A2A;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="score">Score: -0.5</div>
  <div id="timer">Time: 0</div>
  <canvas id="gameCanvas" width="694" height="697"></canvas>
  <div id="instructions">
    <h2>Instructions</h2>
    <p>Tap on coins to collect them and avoid bombs!</p>
    <button onclick="startGame()">Start Game</button>
  </div>
  <button id="restartButton" onclick="restartGame()">Restart Game</button>

  <audio id="coinSound" src="path/to/coin-sound.mp3"></audio>
  <audio id="bombSound" src="path/to/bomb-sound.mp3"></audio>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let timeLeft = 60; // 60 seconds duration
    let gameOver = false;
    const coins = [];
    const bombs = [];
    const gravity = 6;
    const coinImage = new Image();
    coinImage.src = 'https://etn.ethio-tech.com/brand-assets/logos/coin_full.png';

    const bombImage = new Image();
    bombImage.src = 'https://etn.ethio-tech.com/brand-assets/logos/jebena1.png';

    function createCoin() {
      const size = Math.random() * 40 + 10;
      const x = Math.random() * (canvas.width - size);
      coins.push({ x, y: -size, size, tapped: false });
    }

    function createBomb() {
      const size = 50; // Keep bomb size consistent
      const x = Math.random() * (canvas.width - size);
      bombs.push({ x, y: -size, size, explode: false });
    }

    function drawGrid() {
      ctx.strokeStyle = '#F2C94C';
      ctx.lineWidth = 0.5;
      const gridSize = 50;

      for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawCoins() {
      coins.forEach((coin, index) => {
        if (!coin.tapped) {
          ctx.drawImage(coinImage, coin.x, coin.y, coin.size, coin.size);
        } else {
          ctx.fillStyle = 'yellow';
          ctx.beginPath();
          ctx.arc(coin.x + coin.size / 2, coin.y + coin.size / 2, coin.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        coin.y += gravity;
        if (coin.y > canvas.height) coins.splice(index, 1);
      });
    }

    function drawBombs() {
      bombs.forEach((bomb, index) => {
        if (!bomb.explode) {
          ctx.drawImage(bombImage, bomb.x, bomb.y, bomb.size, bomb.size);
        } else {
          ctx.fillStyle = 'red';
          ctx.beginPath();
          ctx.arc(bomb.x + bomb.size / 2, bomb.y + bomb.size / 2, bomb.size, 0, Math.PI * 2);
          ctx.fill();

          // Sparks animation for bombs
          for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            const sparkX = bomb.x + bomb.size / 2 + (Math.random() - 0.5) * 30;
            const sparkY = bomb.y + bomb.size / 2 + (Math.random() - 0.5) * 30;
            ctx.arc(sparkX, sparkY, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        bomb.y += gravity;
        if (bomb.y > canvas.height) bombs.splice(index, 1);
      });
    }

    function handleTap(e) {
      const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
      const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);

      coins.forEach((coin, index) => {
        if (x >= coin.x && x <= coin.x + coin.size && y >= coin.y && y <= coin.y + coin.size) {
          score += 0.5;
          coin.tapped = true;
          setTimeout(() => coins.splice(index, 1), 150);
          document.getElementById('coinSound').play(); // Play coin sound
          updateScore();
        }
      });

      bombs.forEach((bomb, index) => {
        if (x >= bomb.x && x <= bomb.x + bomb.size && y >= bomb.y && y <= bomb.y + bomb.size) {
          score -= 1;
          bomb.explode = true;
          setTimeout(() => bombs.splice(index, 1), 150);
          document.getElementById('bombSound').play(); // Play bomb sound
          updateScore();
        }
      });
    }

    function updateScore() {
      document.getElementById('score').innerText = `Score: ${score}`;
    }

    function updateTimer() {
      document.getElementById('timer').innerText = `Time: ${timeLeft}`;
      if (timeLeft <= 10) {
        document.getElementById('timer').style.color = 'red'; // Change color to red for urgency
      }
    }

    function endGame() {
      gameOver = true;
      clearInterval(coinInterval);
      clearInterval(bombInterval);
      clearInterval(timerInterval);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      document.getElementById('restartButton').style.display = 'block'; // Show restart button
      alert(`Game over! Final Score: ${score}`);
    }

    function gameLoop() {
      if (gameOver) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawCoins();
      drawBombs();
    }

    function startGame() {
      score = 0;
      timeLeft = 60;
      gameOver = false;
      coins.length = 0;
      bombs.length = 0;
      updateScore();
      updateTimer();
      document.getElementById('instructions').style.display = 'none'; // Hide instructions
      startIntervals(); // Start intervals for coins and bombs
      gameLoop(); // Start the game loop
    }

    function restartGame() {
      score = 0;
      timeLeft = 60;
      gameOver = false;
      coins.length = 0;
      bombs.length = 0;
      updateScore();
      updateTimer();
      document.getElementById('restartButton').style.display = 'none'; // Hide restart button
      startIntervals(); // Restart intervals for coins and bombs
      gameLoop(); // Restart the game loop
    }

    function startIntervals() {
      coinInterval = setInterval(createCoin, 500);
      bombInterval = setInterval(createBomb, 1000);
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    const coinInterval = setInterval(createCoin, 500);
    const bombInterval = setInterval(createBomb, 1000);
    const timerInterval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) endGame();
    }, 1000);

    window.addEventListener('click', handleTap);
    window.addEventListener('touchstart', handleTap);
    document.getElementById('instructions').style.display = 'block'; // Show instructions on page load
  </script>
</body>
</html>
