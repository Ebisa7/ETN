<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETN Coin Drop Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <h1>ETN Coin Drop Game</h1>
    <p>Catch coins, avoid bombs, and earn $ETN!</p>
    
    <div class="game-area">
      <!-- Your game logic and display here -->
      <p>Playing game... (replace this with actual game logic)</p>
      <button id="end-game-button">End Game</button> <!-- This button will simulate game completion -->
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const endGameButton = document.getElementById('end-game-button');

      // Simulate the game ending and earning coins
      endGameButton.addEventListener('click', function() {
        let coinsEarned = 100; // This should be dynamically generated based on game results
        alert('Game Over! You earned ' + coinsEarned + ' ETN');
        
        // Send the coins back to the parent window (index.html)
        window.opener.postMessage({ coinsEarned: coinsEarned }, '*');

        // Redirect back to index.html
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
