<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Drop Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #133A2A;
      color: white;
      overflow: hidden;
    }

    #game-screen {
      width: 100vw;
      height: 100vh;
      position: relative;
      background-color: #133A2A;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .coin, .bomb, .freeze {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
    }

    .coin {
      background-color: yellow;
    }

    .bomb {
      background-color: black;
    }

    .freeze {
      background-color: blue;
    }

    #play-btn {
      font-size: 24px;
      padding: 10px 20px;
      background-color: #F2C94C;
      border: none;
      cursor: pointer;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #timer, #score {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 24px;
      color: white;
    }
  </style>
</head>
<body>
  <div id="game-screen">
    <button id="play-btn">Play</button>
    <div id="timer">Timer: 30</div>
    <div id="score">Score: 0</div>
  </div>

  <script>
    let score = 0;
    let timer = 30;
    let gameInterval;
    let isFrozen = false;
    const freezeDuration = 3000; // Freeze for 3 seconds
    const numCircles = 75; // Total circles to drop
    const numBombs = 5; // Total bombs
    const numFreezes = 5; // Total freeze circles

    // Handle play button
    document.getElementById('play-btn').addEventListener('click', startGame);

    // Create coins, bombs, and freezes
    function startGame() {
      document.getElementById('play-btn').style.display = 'none'; // Hide play button

      gameInterval = setInterval(() => {
        if (!isFrozen && timer > 0) {
          timer--;
          document.getElementById('timer').textContent = `Timer: ${timer}`;
        } else if (timer === 0) {
          clearInterval(gameInterval);
          alert('Game Over!');
        }
      }, 1000);

      // Drop circles, bombs, and freezes
      for (let i = 0; i < numCircles; i++) {
        setTimeout(createCircle, i * 500);
      }
      for (let i = 0; i < numBombs; i++) {
        setTimeout(createBomb, Math.random() * 30000); // Random bomb timing
      }
      for (let i = 0; i < numFreezes; i++) {
        setTimeout(createFreeze, Math.random() * 30000); // Random freeze timing
      }
    }

    function createCircle() {
      const circle = document.createElement('div');
      circle.classList.add('coin');
      circle.style.left = Math.random() * 80 + 'vw';
      document.getElementById('game-screen').appendChild(circle);

      animateDrop(circle);

      circle.addEventListener('click', function () {
        if (!isFrozen) {
          score++;
          document.getElementById('score').textContent = `Score: ${score}`;
          this.remove();
        }
      });
    }

    function createBomb() {
      const bomb = document.createElement('div');
      bomb.classList.add('bomb');
      bomb.style.left = Math.random() * 80 + 'vw';
      document.getElementById('game-screen').appendChild(bomb);

      animateDrop(bomb);

      bomb.addEventListener('click', function () {
        if (!isFrozen) {
          score = 0; // Reset score if bomb is clicked
          document.getElementById('score').textContent = `Score: ${score}`;
          this.remove();
        }
      });
    }

    function createFreeze() {
      const freeze = document.createElement('div');
      freeze.classList.add('freeze');
      freeze.style.left = Math.random() * 80 + 'vw';
      document.getElementById('game-screen').appendChild(freeze);

      animateDrop(freeze);

      freeze.addEventListener('click', function () {
        if (!isFrozen) {
          freezeGame();
          this.remove();
        }
      });
    }

    function animateDrop(element) {
      element.style.position = 'absolute';
      element.style.top = '-10vh';

      let dropInterval = setInterval(() => {
        if (isFrozen) return; // Pause dropping during freeze

        let currentTop = parseFloat(element.style.top);
        element.style.top = currentTop + 2 + 'vh';

        if (currentTop > 100) {
          clearInterval(dropInterval);
          element.remove(); // Remove element if it reaches the bottom
        }
      }, 50);
    }

    function freezeGame() {
      isFrozen = true;
      setTimeout(() => {
        isFrozen = false;
      }, freezeDuration); // Resume game after freeze duration
    }
  </script>
</body>
</html>
