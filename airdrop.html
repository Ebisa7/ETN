<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airdrop User Info</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
    }

    h1 {
      color: #333;
    }

    .user-info {
      margin: 20px;
      padding: 10px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    img.profile-pic {
      border-radius: 50%;
      width: 100px;
      height: 100px;
    }

    .close-button {
      background-color: var(--tg-theme-button-color);
      color: var(--tg-theme-button-text-color);
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 20px;
    }

    .close-button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>User Info</h1>
  <div class="user-info">
    <img id="profilePic" class="profile-pic" alt="Profile Picture" />
    <p id="username"></p>
    <p id="user-id"></p>
    <p id="creation-date"></p>
    <p id="account-age"></p>
    <p id="is-premium"></p>
    <button class="close-button" id="closeButton">Close</button>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    window.onload = function () {
      const tg = window.Telegram.WebApp;
      const user = tg.initDataUnsafe?.user;

      if (user) {
        // Display user info
        document.getElementById('username').textContent = `Username: @${user.username || 'N/A'}`;
        document.getElementById('user-id').textContent = `User ID: ${user.id}`;
        document.getElementById('profilePic').src = user.photo_url || 'default-profile-pic.png'; // Use real profile picture

        // Estimate creation date and account age
        const userId = user.id;
        const startingId = 1_000_000_000; // Rough estimate for when Telegram started assigning IDs
        const currentYear = new Date().getFullYear();

        // Calculate approximate creation year based on user ID
        const idDifference = userId - startingId;
        const estimatedCreationYear = currentYear - Math.floor(idDifference / 1_000_000); // Assuming about 1M users per year

        // Set creation date and account age text
        document.getElementById('creation-date').textContent = `Creation Year: ${estimatedCreationYear}`;
        const accountAge = currentYear - estimatedCreationYear;
        document.getElementById('account-age').textContent = `Account Age: ${accountAge >= 1 ? accountAge + ' years' : 'Less than a year'}`;

        // Premium status (assuming it exists in the user object)
        document.getElementById('is-premium').textContent = `Premium Account: ${user.is_premium ? 'Yes' : 'No'}`;
      } else {
        alert('Unable to fetch user data');
      }

      // Close button
      document.getElementById('closeButton').addEventListener('click', () => {
        tg.close();
      });
    };
  </script>
</body>
</html>
