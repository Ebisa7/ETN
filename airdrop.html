<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram User Info</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 50px;
      background-color: #f9f9f9;
    }
    h1 {
      font-size: 24px;
    }
    .user-info {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Your Telegram Details</h1>
  <div id="user-info" class="user-info">
    <p>First Name: <span id="first-name">Loading...</span></p>
    <p>Last Name: <span id="last-name">Loading...</span></p>
    <p>Username: <span id="username">Loading...</span></p>
    <p>User ID: <span id="user-id">Loading...</span></p>
    <p>Premium User: <span id="is-premium">Loading...</span></p>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    window.Telegram.WebApp.ready();

    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if (user) {
      document.getElementById('first-name').innerText = user.first_name;
      document.getElementById('last-name').innerText = user.last_name || 'N/A';
      document.getElementById('username').innerText = user.username || 'N/A';
      document.getElementById('user-id').innerText = user.id;
      document.getElementById('is-premium').innerText = user.is_premium ? 'Yes' : 'No';
    } else {
      alert("No data available. Make sure you are running this within Telegram Web App.");
    }
  </script>
</body>
</html>
